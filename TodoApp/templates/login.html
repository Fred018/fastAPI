{% include 'layout.html' %}
<div class="container">
    <div class="card">
        <div class="card-header">
            Login
        </div>
        <div class="card-body">
            <form action="" id="loginForm">
                <div class="form-group">
                    <label for="">Username</label>
                    <input class="form-control" type="text" name="username" autocomplete="Username" required>
                </div>
                <div class="form-group">
                    <label for="">Password</label>
                    <input class="form-control" type="password" name="password" autocomplete="password" required>
                </div>
                <button type="submit" class="btn btn-primary">login</button>
            </form>
        </div>
        <div class="card-footer tex-muted">
            <a href="/auth/register-page">register?</a>
        </div>
    </div>
</div>
