{% include 'layout.html' %}

<div class="container">
    <div class="card">
        <div class="card-header">
            Let's edit your todo
        </div>
        <div class="card-body">
            <form action="" id="editTodoForm">
                <div class="form-group">
                    <label for="">Title</label>
                    <input type="text" name="title" class="form-control" value="{{todo.title}}" required>
                </div>
                 <div class="form-group">
                    <label for="">Description</label>
                    <textarea name="description" class="form-control" rows="3" required>{{todo.description}}</textarea>
                </div>
                 <div class="form-group">
                    <label for="">Priority</label>
                    <select name="priority" class="form-control">
                        {% for i in range(1, 6) %}
                        <option value="{{i}}" {% if todo.priority == i %} selected="selected"{% endif %}>{{i}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" name="complete" class="form-check-input" {% if todo.complete %} checked {% endif %}>
                    <label class="form-check-label">Complete</label>
                </div>

                <button type="submit" class="btn btn-primary">
                        Edit yur todo
                </button>
                <button type="button" class="btn btn-danger" id="deleteButton">
                        Delete
                </button>
                <a href="/todos/todo-page" class="btn btn-success">Back</a>
            </form>
        </div>
    </div>
</div>
